<template id="template-search">
  <div class="page-enter">
    <header class="page-heading">
      <div>
        <span class="eyebrow">Глобальный поиск</span>
        <h1>Поиск по всему сайту</h1>
        <p>Ищем одновременно по ЖК, городам, застройщикам, новостям, источникам, рискам и истории анализов аккаунта.</p>
      </div>
    </header>
    <section class="card site-search-card">
      <form id="siteSearchForm" class="site-search-form">
        <input id="siteSearchQuery" class="input" value="[[QUERY]]" placeholder="Например: Москва, Северный берег, прокуратура, критический риск">
        <button class="primary-btn" type="submit">Найти</button>
      </form>
      <div class="search-summary">
        <span>Объекты: <b>[[PROJECT_COUNT]]</b></span>
        <span>Новости: <b>[[EVENT_COUNT]]</b></span>
        <span>История аккаунта: <b>[[HISTORY_COUNT]]</b></span>
      </div>
    </section>
    <div class="search-grid">[[SEARCH_SECTIONS]]</div>
  </div>
</template>
