<template id="template-notifications">
  <div class="page-enter">
    <header class="page-heading">
      <div>
        <span class="eyebrow">Центр событий</span>
        <h1>Уведомления по подпискам</h1>
        <p>Показываем только новости по выбранным локациям, застройщикам и проектам аналитика.</p>
      </div>
      <div class="page-heading-actions">
        <button id="markAllRead" class="secondary-btn" [[MARK_ALL_DISABLED]]>Отметить все прочитанными</button>
        <button id="clearAllNotifications" class="secondary-btn danger-btn" [[CLEAR_ALL_DISABLED]]>Удалить все</button>
      </div>
    </header>
    <div class="notification-layout">
      <section class="card">
        <div class="card-head">
          <h2>Моя лента уведомлений</h2>
          <span class="chip [[UNREAD_CHIP_CLASS]]">[[UNREAD_LABEL]]</span>
        </div>
        <div class="notification-list">[[NOTIFICATION_ROWS]]</div>
      </section>
      <aside class="notification-settings">
        <section class="card">
          <div class="card-head"><h2>Быстрые действия</h2></div>
          <div class="source-list">
            <button class="secondary-btn" data-route="news">Открыть ленту и риски</button>
            <button class="secondary-btn" data-route="ai-analysis">Перейти к аналитике потока</button>
            <button class="secondary-btn" data-route="profile">Настроить подписки</button>
          </div>
        </section>
        <section class="card push-card">
          <div class="push-icon">!</div>
          <h2>Push-уведомления</h2>
          <p>Получайте системное уведомление, когда появляется критическая новость по проекту.</p>
          <div class="push-status [[PUSH_ENABLED_CLASS]]"><i></i>[[PUSH_STATUS]]</div>
          <button id="pushToggle" class="[[PUSH_BUTTON_CLASS]]">[[PUSH_BUTTON_TEXT]]</button>
          [[TEST_PUSH_BUTTON]]
        </section>
        <section class="card">
          <div class="card-head"><h2>Активные подписки</h2></div>
          <div class="subscription-summary">
            <span>Локации: <b>[[LOCATIONS_COUNT]]</b></span>
            <span>Застройщики: <b>[[DEVELOPERS_COUNT]]</b></span>
            <span>Проекты: <b>[[PROJECTS_COUNT]]</b></span>
          </div>
        </section>
        <section class="card">
          <div class="card-head"><h2>Каналы</h2></div>
          <div class="detail-list">
            <div class="detail-row"><span>В приложении</span><b>Включены</b></div>
            <div class="detail-row"><span>Push в браузере</span><b>[[PUSH_CHANNEL_STATUS]]</b></div>
            <div class="detail-row"><span>Email-сводка</span><b>Ежедневно</b></div>
          </div>
        </section>
      </aside>
    </div>
  </div>
</template>
