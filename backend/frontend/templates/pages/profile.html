<template id="template-profile">
  <div class="page-enter">
    <header class="page-heading">
      <div>
        <span class="eyebrow">Учётная запись</span>
        <h1>Личный кабинет аналитика</h1>
      </div>
    </header>
    <div class="profile-grid">
      <section class="card profile-summary">
        <div class="profile-avatar-large">[[USER_INITIALS]]</div>
        <h2>[[USER_NAME]]</h2>
        <div class="profile-role">[[USER_ROLE]]</div>
        <div class="profile-status">В системе</div>
        <div class="profile-identity-card">
          <div><span>ФИО</span><b>[[USER_NAME]]</b></div>
          <div><span>Email</span><b>[[USER_EMAIL]]</b></div>
        </div>
        <div class="detail-list profile-detail-list">
          <div class="detail-row"><span>Роль</span><b>[[USER_ROLE]]</b></div>
          <div class="detail-row"><span>Подразделение</span><b>[[USER_DEPARTMENT]]</b></div>
        </div>
        <div class="profile-actions">
          <button class="secondary-btn" data-action="edit-profile">Редактировать</button>
          <button class="secondary-btn" data-action="logout">Выйти</button>
        </div>
      </section>
      <div>
        <section class="card">
          <div class="card-head">
            <div><h2>Подписки на уведомления</h2><span class="object-meta">Уведомления приходят только по выбранным локациям, застройщикам и проектам</span></div>
          </div>
          <div class="subscription-grid">
            <div><h3>Локации</h3><div class="subscription-list">[[LOCATION_CHECKBOXES]]</div></div>
            <div><h3>Застройщики</h3><div class="subscription-list">[[DEVELOPER_CHECKBOXES]]</div></div>
            <div><h3>Проекты</h3><div class="subscription-list">[[PROJECT_CHECKBOXES]]</div></div>
          </div>
        </section>
        <section class="card">
          <div class="card-head"><h2>История анализов аккаунта</h2><button class="text-link" data-route="history">Вся история</button></div>
          <div class="history-list">[[ACCOUNT_HISTORY_ROWS]]</div>
        </section>
      </div>
    </div>
    <dialog id="profileEditDialog" class="profile-edit-dialog">
      <form id="profileEditForm" class="form-stack" method="dialog">
        <div class="profile-edit-head">
          <div><span class="eyebrow">Данные аккаунта</span><h2>Редактировать профиль</h2></div>
          <button class="icon-close" type="button" data-action="close-profile-editor" aria-label="Закрыть">×</button>
        </div>
        <div class="field"><label for="profileEditUsername">ФИО или имя пользователя</label><input id="profileEditUsername" class="input" maxlength="100" value="[[EDIT_USER_NAME]]" required></div>
        <div class="field"><label for="profileEditEmail">Корпоративная почта</label><input id="profileEditEmail" class="input" type="email" maxlength="100" value="[[EDIT_USER_EMAIL]]"></div>
        <div class="form-row">
          <div class="field"><label for="profileEditRole">Роль</label><input id="profileEditRole" class="input" maxlength="100" value="[[EDIT_USER_ROLE]]"></div>
          <div class="field"><label for="profileEditDivision">Подразделение</label><input id="profileEditDivision" class="input" maxlength="100" value="[[EDIT_USER_DEPARTMENT]]"></div>
        </div>
        <div class="form-row">
          <div class="field"><label for="profileEditPassword">Пароль для подтверждения</label><input id="profileEditPassword" class="input" type="password" autocomplete="current-password" minlength="6" maxlength="100" required></div>
          <div class="field"><label for="profileEditConfirm">Повторите пароль</label><input id="profileEditConfirm" class="input" type="password" autocomplete="current-password" minlength="6" maxlength="100" required></div>
        </div>
        <div id="profileEditError" class="form-error"></div>
        <div class="profile-edit-actions">
          <button class="secondary-btn" type="button" data-action="close-profile-editor">Отмена</button>
          <button id="profileEditSubmit" class="primary-btn" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>
  </div>
</template>
