<template id="template-project-detail">
  <div class="page-enter project-detail-page">
    <div class="detail-actions">
      <button class="text-link" data-route="projects" type="button">← Все объекты</button>
    </div>
    [[CONTENT]]
  </div>
</template>

<template id="component-project-detail-card">
  <section class="card project-detail-hero">
    <div>
      <span class="detail-kicker">Карточка ЖК · наш.дом.рф</span>
      <h1>[[NAME]]</h1>
      <p>[[ADDRESS]]</p>
    </div>
    <a class="primary-btn detail-source-btn" href="[[SOURCE_URL]]" target="_blank" rel="noopener">Открыть источник</a>
  </section>

  <section class="detail-grid">
    <article class="card detail-main-card">
      <div class="card-head"><h2>Паспорт объекта</h2>[[STATUS]]</div>
      <dl class="detail-list">
        <div><dt>Город</dt><dd>[[CITY]]</dd></div>
        <div><dt>Регион</dt><dd>[[REGION]]</dd></div>
        <div><dt>Застройщик</dt><dd>[[DEVELOPER]]</dd></div>
        <div><dt>ИНН / ОГРН</dt><dd>[[INN_OGRN]]</dd></div>
        <div><dt>ID объекта</dt><dd>[[DOMRF_ID]]</dd></div>
      </dl>
    </article>

    <article class="card detail-main-card">
      <div class="card-head"><h2>Строительство</h2></div>
      <div class="detail-progress">
        <div class="detail-progress-value"><b>[[PROGRESS]]</b><span>%</span></div>
        <div class="progress-line"><span style="width:[[PROGRESS]]%"></span></div>
      </div>
      <dl class="detail-list">
        <div><dt>Плановый ввод</dt><dd>[[PLANNED_DATE]]</dd></div>
        <div><dt>Фактический ввод</dt><dd>[[ACTUAL_DATE]]</dd></div>
      </dl>
    </article>
  </section>

  <section class="detail-grid">
    <article class="card">
      <div class="card-head"><h2>Риск-подсказки</h2></div>
      <div class="detail-risk-list">[[RISK_HINTS]]</div>
    </article>
    <article class="card">
      <div class="card-head"><h2>Документы и фото</h2></div>
      <div class="detail-assets">
        <div><b>Документы</b><span>[[DOCUMENTS_COUNT]]</span></div>
        <div><b>Фото хода строительства</b><span>[[PHOTOS_COUNT]]</span></div>
      </div>
      [[PHOTOS]]
    </article>
  </section>
</template>

<template id="component-project-detail-risk">
  <article class="detail-risk-item [[LEVEL_CLASS]]">
    <b>[[TITLE]]</b>
    <p>[[SUMMARY]]</p>
  </article>
</template>

<template id="component-project-detail-photo">
  <img class="detail-photo" src="[[URL]]" alt="Фото хода строительства" loading="lazy">
</template>

<template id="component-project-detail-basic">
  <section class="card project-detail-hero">
    <div>
      <span class="detail-kicker">Карточка ЖК</span>
      <h1>[[NAME]]</h1>
      <p>[[META]]</p>
    </div>
  </section>
  <section class="card">
    <h2>Данные наш.дом.рф пока не подключены</h2>
    <p class="detail-muted">Для этой записи не найден внешний ID объекта. После синхронизации наш.дом.рф проект должен иметь ID вида <b>domrf:62484</b>.</p>
  </section>
</template>
