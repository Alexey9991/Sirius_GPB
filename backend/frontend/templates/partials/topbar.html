<header class="topbar">
  <a class="brand route-link" href="/index.html" data-route="dashboard" aria-label="На главную">
    <span class="brand-mark">GPB</span>
    <span><b>Risk Desk</b><small>Недвижимость и импакт-сигналы</small></span>
  </a>

  <label class="global-search">
    <span>⌕</span>
    <input id="globalSearch" type="search" placeholder="Поиск по сайту: ЖК, город, застройщик, риск или новость" />
  </label>

  <div class="top-actions">
    <button class="header-action notification-button" data-action="toggle-notifications" aria-label="Открыть уведомления" aria-expanded="false">
      <span class="header-action-icon" aria-hidden="true">!</span>
      <span class="header-action-copy"><b>Уведомления</b><small id="notificationCount">3 новых</small></span>
      <span class="notification-dot"></span>
    </button>
    <button id="profileButton" class="header-action profile-button" data-route="profile" data-href="/profile.html" aria-label="Открыть профиль аналитика">
      <span id="profileAvatar" class="profile-avatar" aria-hidden="true">→</span>
      <span class="header-action-copy"><b id="profileName">Войти</b><small>Профиль аналитика</small></span>
    </button>
  </div>
</header>
