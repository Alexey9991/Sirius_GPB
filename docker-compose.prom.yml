services:
  postgres:
    image: postgres:18.4
    container_name: siriusgpb-postgres
    restart: unless-stopped
    networks:
      - siriusgpb-network
    ports:
      - "5432:5432"
    env_file:
      - config/.env
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    image: siriusgpb-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: siriusgpb-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    depends_on:
      - postgres

volumes:
  pgdata: