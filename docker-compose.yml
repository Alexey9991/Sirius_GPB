services:
  app:
    build: .
    container_name: siriusgpb
    ports:
      - "8501:8501"  # Streamlit
      - "8000:8000"  # Flask API
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_BASE_URL=http://localhost:8000/api/v1
      - USE_MOCK_API=false
      - DEV_AUTO_RELOAD=true
      - FLASK_DEBUG=false
      - DB_PATH=/src/dbtest
      - DB_FILE=/src/dbtest/db.sqlite3
    # Volumes for development (optional - comment out for production)
    # volumes:
    #   - ./src:/src/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
