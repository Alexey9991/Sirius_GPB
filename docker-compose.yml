services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: siriusgpb-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.backend
    volumes:
      - ./backend:/backend

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: siriusgpb-app
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
    depends_on:
      - backend