services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: siriusgpb-backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - FLASK_DEBUG=false
      - DB_PATH=/backend/dbtest
      - DB_FILE=/backend/dbtest/db.sqlite3
    volumes:
      - ./backend:/backend
      - ./backend/dbtest:/backend/dbtest

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siriusgpb-app
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
      - USE_MOCK_API=false
      - DEV_AUTO_RELOAD=true
    volumes:
      - ./app:/app
    depends_on:
      - backend
    stdin_open: true
    tty: true
