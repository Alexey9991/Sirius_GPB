services:
  backend:
    image: siriusgpb-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: siriusgpb-backend
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./config:/app/config