services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siriusgpb-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.backend
    volumes:
      - ./backend:/backend
      - ./backend/dbtest:/backend/dbtest
    depends_on:
      - backend

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: siriusgpb-app
    ports:
      - "8501:8501"
    env_file:
      - .env.app
    volumes:
      - ./app:/app
    depends_on:
      - backend
    stdin_open: true
    tty: true
